theme:
  name: material
  custom_dir: docs/overrides
  language: zh
  features:
    - navigation.sections  # 启用左侧导航栏的分组
    - navigation.indexes  # 允许 section 使用 index.md 作为首页
    - navigation.footer
    - navigation.tracking  # URL 锚点跟随滚动高亮
    - toc.follow  # 右侧 TOC 高亮跟随当前章节
    # - toc.integrate  # 暂时关闭，恢复标准右侧 TOC，便于对比效果
    - search.highlight  # 搜索时高亮匹配内容
    - search.suggest  # 搜索时显示建议
    - search.share  # 搜索框分享按钮，复制带 query 的 URL
    - content.code.annotate  # 代码块注释
    - content.code.copy  # 代码块右上角复制按钮
    - content.tooltips  # 内容中的工具提示
    - content.action.edit  # 页面级"编辑此页"按钮
    - content.action.view  # 页面级"查看源文件"按钮
  palette:
    primary: custom  # 主色调
    accent: custom  # 强调色
  font:
    text: Roboto  # 正文字体
    code: Roboto Mono  # 代码字体
 
extra_javascript:
    - javascripts/toc.js
    - javascripts/nav-toc.js
    - javascripts/mathjax-sri.js

extra_css:
    - stylesheets/extra.css

markdown_extensions:
    - admonition
    - attr_list  # 首页 grid cards 需要
    - footnotes
    - md_in_html  # 首页 grid cards 需要
    - codehilite
    - toc:
        permalink: true
        toc_depth: 3
    - pymdownx.arithmatex
    - pymdownx.tilde
    - pymdownx.tasklist
    - pymdownx.superfences

plugins:
  - search:
     separator: '[\s\u200b\-]'
  - git-revision-date-localized:
      locale: zh
      type: date
      fallback_to_build_date: true
  - exclude:
      glob:
        - clients/tron-grid.md
        - contracts/trc20.md
        - contracts/tvm.md
        - developers/contribution.md
        - developers/gpg.md
        - developers/incentives.md
        - developers/resources.md
        - faq/index.md
        - introduction/index.md
        - introduction/overview.md
        - mechanism-algorithm/shielded-TRC20-contract.md
        - mechanism-algorithm/trc10.md

